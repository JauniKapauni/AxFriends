name: AxFriends
description: $description
prefix: AxFriends
version: '${version}'

main: de.jaunikapauni.axfriends.AxFriends
api-version: '26.1.2'
load: POSTWORLD

authors: [ JauniKapauni ]
website: https://github.com/JauniKapauni

commands:
  addfriend:
    usage: /addfriend
    description: Command to add a player as a friend
  listfriends:
    usage: /listfriends
    description: Command to see a list of all friends
  removefriend:
    usage: /removefriend
    description: Command to remove a player as a friend
  acceptfriendrequest:
    usage: /acceptfriendrequest
    description: Command to accept a friend request
  denyfriendrequest:
    usage: /denyfriendrequest
    description: Command to deny a friend request